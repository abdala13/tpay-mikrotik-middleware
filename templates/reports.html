{% extends "base.html" %}{% block content %}<div class="header"><h1>Reports</h1><a class="btn" href="{{ url_for('main.new_audit') }}">New Audit</a></div><div class="card"><table><tr><th>Date</th><th>Website</th><th>Score</th><th>Risk</th><th>Status</th><th></th></tr>{% for a in audits %}<tr><td>{{ a.created_at.strftime('%Y-%m-%d') }}</td><td>{{ a.normalized_url }}</td><td>{{ a.trust_score }}</td><td>{{ a.conversion_risk }}</td><td>{{ a.status }}</td><td><a href="{{ url_for('main.report', audit_id=a.id) }}">Open</a></td></tr>{% endfor %}</table></div>{% endblock %}
