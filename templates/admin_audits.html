{% extends "base.html" %}{% block content %}<div class="header"><h1>All Audits</h1><a class="ghost" href="{{ url_for('admin.dashboard') }}">Back</a></div><div class="card"><table><tr><th>Date</th><th>User</th><th>URL</th><th>Score</th><th>Status</th></tr>{% for a in audits %}<tr><td>{{ a.created_at.strftime('%Y-%m-%d %H:%M') }}</td><td>{{ a.user.email }}</td><td>{{ a.normalized_url }}</td><td>{{ a.trust_score }}</td><td>{{ a.status }}</td></tr>{% endfor %}</table></div>{% endblock %}
