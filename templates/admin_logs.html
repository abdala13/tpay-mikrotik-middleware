{% extends "base.html" %}{% block content %}<div class="header"><h1>Audit Logs</h1><a class="ghost" href="{{ url_for('admin.dashboard') }}">Back</a></div><div class="card"><table><tr><th>Date</th><th>Action</th><th>Target</th><th>Detail</th></tr>{% for l in logs %}<tr><td>{{ l.created_at.strftime('%Y-%m-%d %H:%M') }}</td><td>{{ l.action }}</td><td>{{ l.target }}</td><td>{{ l.detail }}</td></tr>{% endfor %}</table></div>{% endblock %}
